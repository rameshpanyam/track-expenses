<!DOCTYPE html>
<html>
<head><title>Icon Generator — open in browser, click buttons to download</title></head>
<body style="font-family:sans-serif; padding:40px; background:#0f0f13; color:#e8e8f0; text-align:center;">
<h2>Icon Generator for Expense Tracker PWA</h2>
<p style="color:#7a7a9a; margin-bottom:30px;">Click each button to download the icon, then put both files in the <code>icons/</code> folder.</p>

<div style="display:flex; gap:30px; justify-content:center; flex-wrap:wrap; margin-bottom:30px;">
  <div>
    <canvas id="c192" width="192" height="192" style="border-radius:42px; display:block; margin-bottom:10px;"></canvas>
    <button onclick="download('c192','icon-192.png')" style="padding:10px 20px; background:#7c5cfc; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:15px;">Download icon-192.png</button>
  </div>
  <div>
    <canvas id="c512" width="512" height="512" style="border-radius:112px; display:block; margin-bottom:10px;"></canvas>
    <button onclick="download('c512','icon-512.png')" style="padding:10px 20px; background:#7c5cfc; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:15px;">Download icon-512.png</button>
  </div>
</div>

<script>
function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const r = size * 0.22;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#7c5cfc');
  grad.addColorStop(1, '#a78bfa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Emoji
  ctx.font = `${size * 0.52}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💸', size / 2, size / 2 + size * 0.04);
}

drawIcon('c192', 192);
drawIcon('c512', 512);

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
